image: docker:24

services:
  - docker:24-dind

variables:
  DOCKER_REGISTRY: nayannyk
  IMAGE_TAG: build-$CI_PIPELINE_IID
  NAMESPACE: snake-game

stages:
  - test
  - build
  - deploy
  - verify
  - cleanup

.node-image: &node-image
  image: node:20

.docker-login: &docker-login
  before_script:
    - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"

unit-test:
  stage: test
  <<: *node-image
  script:
    - cd backend && npm install --omit=dev && npm test 2>/dev/null || echo "No tests configured"
  only:
    - main
    - develop

lint:
  stage: test
  <<: *node-image
  script:
    - cd frontend && npx htmlhint index.html 2>/dev/null || echo "HTMLHint not installed"
  only:
    - main
    - develop

build-backend:
  stage: build
  <<: *docker-login
  script:
    - docker build -t "$DOCKER_REGISTRY/snake-backend:$IMAGE_TAG" ./backend
    - docker tag "$DOCKER_REGISTRY/snake-backend:$IMAGE_TAG" "$DOCKER_REGISTRY/snake-backend:latest"
    - docker push "$DOCKER_REGISTRY/snake-backend:$IMAGE_TAG"
    - docker push "$DOCKER_REGISTRY/snake-backend:latest"
  only:
    - main
    - develop

build-frontend:
  stage: build
  <<: *docker-login
  script:
    - docker build -t "$DOCKER_REGISTRY/snake-frontend:$IMAGE_TAG" ./frontend
    - docker tag "$DOCKER_REGISTRY/snake-frontend:$IMAGE_TAG" "$DOCKER_REGISTRY/snake-frontend:latest"
    - docker push "$DOCKER_REGISTRY/snake-frontend:$IMAGE_TAG"
    - docker push "$DOCKER_REGISTRY/snake-frontend:latest"
  only:
    - main
    - develop

deploy:
  stage: deploy
  tags:
    - kind
  script:
    - kubectl apply -f deploy/k8s/namespace.yaml
    - kubectl wait --for=jsonpath='{.status.phase}'=Active namespace/$NAMESPACE --timeout=30s
    - kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.12.0/deploy/static/provider/kind/deploy.yaml
    - kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=120s
    - kubectl apply -f deploy/k8s/
  only:
    - main
    - develop

verify-backend:
  stage: verify
  tags:
    - kind
  script:
    - kubectl rollout status deployment/snake-backend -n "$NAMESPACE" --timeout=120s
  only:
    - main
    - develop

verify-frontend:
  stage: verify
  tags:
    - kind
  script:
    - kubectl rollout status deployment/snake-frontend -n "$NAMESPACE" --timeout=120s
  only:
    - main
    - develop

smoke-test:
  stage: verify
  tags:
    - kind
  script:
    - |
      NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[0].address}')
      NODE_PORT=$(kubectl get svc frontend -n "$NAMESPACE" -o jsonpath='{.spec.ports[0].nodePort}')
      sleep 5
      echo "Testing frontend at http://${NODE_IP}:${NODE_PORT}/ ..."
      curl -sf "http://${NODE_IP}:${NODE_PORT}/" > /dev/null && echo "Frontend: OK" || (echo "Frontend: FAIL" && exit 1)
      curl -sf "http://${NODE_IP}:${NODE_PORT}/api/scores" > /dev/null && echo "Backend: OK" || (echo "Backend: FAIL" && exit 1)
  only:
    - main
    - develop

cleanup:
  stage: cleanup
  script:
    - docker system prune -f --filter "until=24h" 2>/dev/null || true
  only:
    - main
    - develop
