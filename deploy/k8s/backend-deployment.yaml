apiVersion: apps/v1
kind: Deployment
metadata:
  name: snake-backend
  namespace: snake-game
  labels:
    app: snake-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: snake-backend
  template:
    metadata:
      labels:
        app: snake-backend
    spec:
      containers:
      - name: backend
        image: <your-dockerhub-username>/snake-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "300m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: snake-game
spec:
  selector:
    app: snake-backend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
