apiVersion: apps/v1
kind: Deployment
metadata:
  name: snake-backend
  namespace: snake-game
  labels:
    app: snake-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snake-backend
  template:
    metadata:
      labels:
        app: snake-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: fix-perms
        image: nayannyk/snake-backend:latest
        imagePullPolicy: Always
        command: ["cp", "-r", "/app/.", "/data/"]
        volumeMounts:
        - name: app-data
          mountPath: /data
      containers:
      - name: backend
        image: nayannyk/snake-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: false
        volumeMounts:
        - name: app-data
          mountPath: /app
        env:
        - name: PORT
          value: "3000"
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "300m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 5
      volumes:
      - name: app-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: snake-game
spec:
  selector:
    app: snake-backend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
  sessionAffinity: ClientIP
