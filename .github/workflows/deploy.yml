name: Deploy Snake Game

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: your-dockerhub-username
  IMAGE_TAG: ${{ github.ref_name == 'main' && 'stable' || 'develop' }}
  KIND_CLUSTER: kind
  NAMESPACE: snake-game

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run backend tests
        working-directory: ./backend
        run: |
          npm install --omit=dev
          npm test 2>/dev/null || echo "No tests configured"

      - name: Lint frontend
        working-directory: ./frontend
        run: |
          npx htmlhint index.html 2>/dev/null || echo "HTMLHint not installed"

  build-and-push:
    needs: test
    if: github.ref_name == 'main' || github.ref_name == 'develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/snake-backend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/snake-backend:build-${{ github.run_number }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/snake-frontend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/snake-frontend:build-${{ github.run_number }}

  deploy:
    needs: build-and-push
    if: github.ref_name == 'main' || github.ref_name == 'develop'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Load images into Kind
        run: |
          kind load docker-image ${{ env.DOCKER_REGISTRY }}/snake-backend:${{ env.IMAGE_TAG }} --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.DOCKER_REGISTRY }}/snake-frontend:${{ env.IMAGE_TAG }} --name ${{ env.KIND_CLUSTER }}

      - name: Terraform Init
        working-directory: ./deploy/terraform/environments/${{ github.ref_name == 'main' && 'prod' || 'dev' }}
        run: terraform init -reconfigure

      - name: Terraform Plan
        working-directory: ./deploy/terraform/environments/${{ github.ref_name == 'main' && 'prod' || 'dev' }}
        run: terraform plan -var="image_tag=${{ env.IMAGE_TAG }}" -out=tfplan

      - name: Terraform Apply
        working-directory: ./deploy/terraform/environments/${{ github.ref_name == 'main' && 'prod' || 'dev' }}
        run: terraform apply -auto-approve tfplan

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/snake-backend -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/snake-frontend -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Smoke test
        run: |
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[0].address}')
          NODE_PORT=$(kubectl get svc frontend -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.ports[0].nodePort}')
          sleep 5
          curl -sf "http://${NODE_IP}:${NODE_PORT}/" > /dev/null && echo "Frontend: OK" || (echo "Frontend: FAIL" && exit 1)
          curl -sf "http://${NODE_IP}:${NODE_PORT}/api/scores" > /dev/null && echo "Backend: OK" || (echo "Backend: FAIL" && exit 1)

      - name: Cleanup
        run: docker system prune -f --filter "until=24h" 2>/dev/null || true
