name: Terraform Destroy
run-name: Terraform Destroy (${{ inputs.environment }})

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to destroy (dev/prod)
        required: true
        default: dev

env:
  AWS_REGION: ap-south-1
  TF_WORKING_DIR: infrastructure/terraform
  TF_STATE_BASE: snake-game-tfstate

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare S3 backend
        id: backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="${TF_STATE_BASE}-${ACCOUNT_ID}"
          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ steps.backend.outputs.bucket }}" \
            -backend-config="key=infrastructure/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var="environment=${{ inputs.environment }}"

      - name: Summary
        run: |
          echo "## Terraform Destroy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Environment **${{ inputs.environment }}** infrastructure has been destroyed." >> $GITHUB_STEP_SUMMARY
