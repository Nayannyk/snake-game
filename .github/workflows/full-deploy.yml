name: Full Deploy
run-name: Full Deploy (${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref_name }}) ${{ github.ref_name }}

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy (dev/prod)
        required: true
        default: dev
      key_name:
        description: Existing AWS key pair name (leave empty to auto-generate)
        required: false
        default: ""
      instance_type:
        description: EC2 instance type
        required: false
        default: t2.medium

env:
  AWS_REGION: ap-south-1
  TF_WORKING_DIR: infrastructure/terraform
  DOCKER_REGISTRY: nayannyk
  IMAGE_TAG: build-${{ github.run_number }}
  TF_STATE_BASE: snake-game-tfstate

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.name }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=prod" >> "$GITHUB_OUTPUT"
          else
            echo "name=dev" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare S3 backend
        id: backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="${TF_STATE_BASE}-${ACCOUNT_ID}"
          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating S3 bucket: $BUCKET"
            aws s3 mb "s3://${BUCKET}" --region "$AWS_REGION"
          fi

      - name: Check for app code changes
        id: changes
        run: |
          if git rev-parse --verify HEAD~1 &>/dev/null; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff --name-only origin/main HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD 2>/dev/null || echo ".")
          fi
          BACKEND=$(echo "$CHANGED" | grep -q '^backend/' && echo 'true' || echo 'false')
          FRONTEND=$(echo "$CHANGED" | grep -q '^frontend/' && echo 'true' || echo 'false')
          echo "backend=$BACKEND" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND" >> "$GITHUB_OUTPUT"
          ANY=false
          if [ "$BACKEND" = "true" ] || [ "$FRONTEND" = "true" ]; then ANY=true; fi
          echo "any=$ANY" >> "$GITHUB_OUTPUT"
          echo "Changed files:"; echo "$CHANGED"

      - name: Validate inputs
        run: |
          if [ -n "${{ inputs.key_name }}" ]; then
            if ! echo "${{ inputs.key_name }}" | grep -qE '^[a-zA-Z0-9_.-]+$'; then
              echo "Invalid key_name: only alphanumeric, hyphens, underscores, and dots allowed"
              exit 1
            fi
          fi
          if [ -n "${{ inputs.instance_type }}" ]; then
            if ! echo "${{ inputs.instance_type }}" | grep -qE '^[a-z0-9.]+$'; then
              echo "Invalid instance_type"
              exit 1
            fi
          fi

      - name: Build Terraform vars
        id: tf-vars
        run: |
          TAG="${{ env.IMAGE_TAG }}"
          # Use "latest" if no app code changed (images already on Docker Hub)
          if [ "${{ steps.changes.outputs.any }}" = "false" ]; then TAG="latest"; fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          VARS="-var=environment=${{ inputs.environment }} -var=instance_type=${{ inputs.instance_type }}"
          if [ -n "${{ inputs.key_name }}" ]; then
            KEY="${{ inputs.key_name }}"
            KEY="${KEY%.pem}"
            VARS="$VARS -var=key_name=$KEY"
          fi
          echo "value=${VARS}" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ steps.backend.outputs.bucket }}" \
            -backend-config="key=infrastructure/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply
        id: apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve ${{ steps.tf-vars.outputs.value }}

      - name: Get EC2 outputs
        id: ec2
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "public_ip=$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"
          echo "game_url=http://$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"

      - name: Write SSH key
        id: ssh
        continue-on-error: true
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          KEY=$(terraform output -raw private_key_pem 2>/dev/null || echo "")
          if [ -z "$KEY" ]; then
            KEY="${{ secrets.SSH_PRIVATE_KEY }}"
          fi
          if [ -n "$KEY" ]; then
            echo "$KEY" > /tmp/ssh-key.pem
            chmod 600 /tmp/ssh-key.pem
            echo "file=/tmp/ssh-key.pem" >> "$GITHUB_OUTPUT"
          else
            echo "No SSH key available — SSH-dependent steps will be skipped"
          fi

      - name: Wait for EC2 + Kind cluster
        if: steps.ssh.outputs.file != ''
        shell: bash
        run: |
          IP=${{ steps.ec2.outputs.public_ip }}
          SSH="ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 -i ${{ steps.ssh.outputs.file }} ubuntu@${IP}"
          echo "Waiting for SSH + cluster ready on ${IP}..."
          for i in $(seq 1 90); do
            READY=$(${SSH} "kubectl get nodes 2>/dev/null | wc -l" 2>/dev/null || echo "0")
            if [ "$READY" -ge 2 ] 2>/dev/null; then
              echo "EC2 + Kind cluster ready (attempt $i)"
              ${SSH} "kubectl get nodes"
              exit 0
            fi
            echo "Attempt $i/90 - waiting..."
            sleep 10
          done
          echo "Timed out"
          exit 1

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend
        if: steps.changes.outputs.any == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/snake-backend:latest
            ${{ env.DOCKER_REGISTRY }}/snake-backend:${{ steps.tf-vars.outputs.tag }}

      - name: Build & push frontend
        if: steps.changes.outputs.any == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/snake-frontend:latest
            ${{ env.DOCKER_REGISTRY }}/snake-frontend:${{ steps.tf-vars.outputs.tag }}

      - name: Deploy to Kind
        if: steps.ssh.outputs.file != ''
        shell: bash
        run: |
          IP=${{ steps.ec2.outputs.public_ip }}
          SSH="ssh -o StrictHostKeyChecking=accept-new -i ${{ steps.ssh.outputs.file }} ubuntu@${IP}"
          SCP="scp -o StrictHostKeyChecking=accept-new -i ${{ steps.ssh.outputs.file }}"

          ${SSH} "mkdir -p /home/ubuntu/manifests"
          for F in deploy/k8s/*.yaml; do
            case "$(basename "$F")" in
              kind-config.yaml) ;;
              *) ${SCP} "$F" ubuntu@${IP}:/home/ubuntu/manifests/ ;;
            esac
          done
          ${SSH} "kubectl apply -f /home/ubuntu/manifests/namespace.yaml"
          ${SSH} "kubectl wait --for=jsonpath='{.status.phase}'=Active namespace/snake-game --timeout=30s"
          ${SSH} "kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.12.0/deploy/static/provider/kind/deploy.yaml"
          ${SSH} "kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=120s"
          ${SSH} "kubectl apply -f /home/ubuntu/manifests/"

      - name: Verify
        if: steps.ssh.outputs.file != ''
        shell: bash
        run: |
          IP=${{ steps.ec2.outputs.public_ip }}
          SSH="ssh -o StrictHostKeyChecking=accept-new -i ${{ steps.ssh.outputs.file }} ubuntu@${IP}"

          echo "=== Backend rollout ==="
          ${SSH} "kubectl rollout status deployment/snake-backend -n snake-game --timeout=120s"

          echo "=== Frontend rollout ==="
          ${SSH} "kubectl rollout status deployment/snake-frontend -n snake-game --timeout=120s"

          echo "=== Resources ==="
          ${SSH} "kubectl get all -n snake-game"
          ${SSH} "kubectl get ingress -n snake-game"

      - name: Smoke test
        if: steps.ssh.outputs.file != ''
        shell: bash
        run: |
          sleep 10
          URL="http://${{ steps.ec2.outputs.public_ip }}"
          echo "Testing ${URL} ..."
          curl -sf "${URL}/" > /dev/null && echo "Frontend: OK" || { echo "Frontend: FAIL"; curl -s "${URL}/" | head -5 || true; }
          curl -sf "${URL}/api/scores" > /dev/null && echo "Backend API: OK" || { echo "Backend API: FAIL"; curl -s "${URL}/api/scores" || true; }

      - name: Summary
        run: |
          echo "## Full Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Game URL | http://${{ steps.ec2.outputs.public_ip }} |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.ssh.outputs.file }}" ]; then
            echo "| SSH | \`ssh -i <key> ubuntu@${{ steps.ec2.outputs.public_ip }}\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SSH | Skipped (no key available — SSH manually using your key) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Image Tag | ${{ env.IMAGE_TAG }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To destroy, run \`terraform destroy\` in \`${{ env.TF_WORKING_DIR }}\`." >> $GITHUB_STEP_SUMMARY

      - name: Cleanup runner
        if: always()
        run: docker system prune -f --filter "until=24h" 2>/dev/null || true
