name: Full Deploy
run-name: Full Deploy (${{ inputs.environment }}) ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy (dev/prod)
        required: true
        default: dev
      key_name:
        description: Existing AWS key pair name (leave empty to auto-generate)
        required: false
        default: ""
      instance_type:
        description: EC2 instance type
        required: false
        default: t2.medium

env:
  AWS_REGION: ap-south-1
  TF_WORKING_DIR: infrastructure/terraform
  DOCKER_REGISTRY: nayannyk
  IMAGE_TAG: build-${{ github.run_number }}
  TF_STATE_BASE: snake-game-tfstate

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare S3 backend
        id: backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="${TF_STATE_BASE}-${ACCOUNT_ID}"
          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating S3 bucket: $BUCKET"
            aws s3 mb "s3://${BUCKET}" --region "$AWS_REGION"
          fi

      - name: Build Terraform vars
        id: tf-vars
        run: |
          VARS="-var=environment=${{ inputs.environment }} -var=instance_type=${{ inputs.instance_type }}"
          if [ -n "${{ inputs.key_name }}" ]; then
            VARS="$VARS -var=key_name=${{ inputs.key_name }}"
          fi
          echo "value=${VARS}" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ steps.backend.outputs.bucket }}" \
            -backend-config="key=infrastructure/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Clean up orphaned resources
        continue-on-error: true
        run: |
          ENV="${{ inputs.environment }}"
          NAME="snake-game-kind-${ENV}"
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${NAME}" "Name=instance-state-name,Values=running,pending,stopping,stopped" \
            --query "Reservations[*].Instances[*].InstanceId" --output text)
          if [ -n "$INSTANCE_ID" ]; then
            echo "Terminating existing EC2 instance: $INSTANCE_ID"
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID"
            aws ec2 wait instance-terminated --instance-ids "$INSTANCE_ID"
          fi
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=${NAME}" --query "SecurityGroups[*].GroupId" --output text)
          if [ -n "$SG_ID" ]; then
            echo "Deleting security group: $SG_ID"
            aws ec2 delete-security-group --group-id "$SG_ID"
          fi

      - name: Terraform Apply
        id: apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve ${{ steps.tf-vars.outputs.value }}

      - name: Get EC2 outputs
        id: ec2
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "public_ip=$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"
          echo "game_url=http://$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"

      - name: Write SSH key
        id: ssh
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          KEY=$(terraform output -raw private_key_pem 2>/dev/null || echo "")
          if [ -z "$KEY" ]; then
            KEY="${{ secrets.SSH_PRIVATE_KEY }}"
          fi
          if [ -n "$KEY" ]; then
            echo "$KEY" > /tmp/ssh-key.pem
            chmod 600 /tmp/ssh-key.pem
            echo "file=/tmp/ssh-key.pem" >> "$GITHUB_OUTPUT"
          else
            echo "No SSH key available" >&2
            exit 1
          fi

      - name: Wait for EC2 + Kind cluster
        shell: bash
        run: |
          IP=${{ steps.ec2.outputs.public_ip }}
          SSH="ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ${{ steps.ssh.outputs.file }} ubuntu@${IP}"
          echo "Waiting for SSH + cluster ready on ${IP}..."
          for i in $(seq 1 90); do
            READY=$(${SSH} "kubectl get nodes 2>/dev/null | wc -l" 2>/dev/null || echo "0")
            if [ "$READY" -ge 2 ] 2>/dev/null; then
              echo "EC2 + Kind cluster ready (attempt $i)"
              ${SSH} "kubectl get nodes"
              exit 0
            fi
            echo "Attempt $i/90 - waiting..."
            sleep 10
          done
          echo "Timed out"
          exit 1

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/snake-backend:latest
            ${{ env.DOCKER_REGISTRY }}/snake-backend:${{ env.IMAGE_TAG }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/snake-frontend:latest
            ${{ env.DOCKER_REGISTRY }}/snake-frontend:${{ env.IMAGE_TAG }}

      - name: Deploy to Kind
        shell: bash
        run: |
          IP=${{ steps.ec2.outputs.public_ip }}
          SSH="ssh -o StrictHostKeyChecking=no -i ${{ steps.ssh.outputs.file }} ubuntu@${IP}"
          SCP="scp -o StrictHostKeyChecking=no -i ${{ steps.ssh.outputs.file }}"

          ${SSH} "mkdir -p /home/ubuntu/manifests"
          ${SCP} deploy/k8s/*.yaml ubuntu@${IP}:/home/ubuntu/manifests/
          ${SSH} "kubectl apply -f /home/ubuntu/manifests/namespace.yaml"
          ${SSH} "kubectl apply -f /home/ubuntu/manifests/"

      - name: Verify
        shell: bash
        run: |
          IP=${{ steps.ec2.outputs.public_ip }}
          SSH="ssh -o StrictHostKeyChecking=no -i ${{ steps.ssh.outputs.file }} ubuntu@${IP}"

          echo "=== Backend rollout ==="
          ${SSH} "kubectl rollout status deployment/snake-backend -n snake-game --timeout=120s"

          echo "=== Frontend rollout ==="
          ${SSH} "kubectl rollout status deployment/snake-frontend -n snake-game --timeout=120s"

          echo "=== Resources ==="
          ${SSH} "kubectl get all -n snake-game"
          ${SSH} "kubectl get ingress -n snake-game"

      - name: Smoke test
        shell: bash
        run: |
          sleep 10
          URL="http://${{ steps.ec2.outputs.public_ip }}"
          echo "Testing ${URL} ..."
          curl -sf "${URL}/" > /dev/null && echo "Frontend: OK" || { echo "Frontend: FAIL"; curl -s "${URL}/" | head -5 || true; }
          curl -sf "${URL}/api/scores" > /dev/null && echo "Backend API: OK" || { echo "Backend API: FAIL"; curl -s "${URL}/api/scores" || true; }

      - name: Summary
        run: |
          echo "## Full Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Game URL | http://${{ steps.ec2.outputs.public_ip }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SSH | \`ssh -i <key> ubuntu@${{ steps.ec2.outputs.public_ip }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ env.IMAGE_TAG }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To destroy, run this workflow again or \`terraform destroy\` in \`${{ env.TF_WORKING_DIR }}\`." >> $GITHUB_STEP_SUMMARY

      - name: Cleanup runner
        if: always()
        run: docker system prune -f --filter "until=24h" 2>/dev/null || true
